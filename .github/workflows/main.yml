name: Keep Alive

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wake up services
        shell: bash
        run: |
          set -u

          URLS="${{ secrets.KEEPALIVE_URLS }}"

          if [ -z "$URLS" ]; then
            echo "No URLs configured. Set KEEPALIVE_URLS secret."
            exit 1
          fi

          IFS=',' read -ra URL_LIST <<< "$URLS"

          failed=0

          for url in "${URL_LIST[@]}"; do
            url="$(echo "$url" | xargs)"

            if [ -z "$url" ]; then
              continue
            fi

            echo "Waking: $url"

            STATUS="$(curl \
              --location \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --connect-timeout 15 \
              --max-time 90 \
              --retry 5 \
              --retry-delay 10 \
              --retry-all-errors \
              -H "User-Agent: GitHub-Actions-KeepAlive" \
              "$url" || echo "000")"

            echo "HTTP status: $STATUS"

            if [[ "$STATUS" =~ ^2|3 ]]; then
              echo "OK"
            else
              echo "Failed to wake: $url"
              failed=1
            fi

            sleep 3
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "Done."
